<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yaoyuancheng - 飞机大作战</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            overflow: hidden;
            position: relative;
        }
        .container {
            text-align: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #ffff00);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient 3s ease infinite;
        }
        .game-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
            font-size: 1.2rem;
        }
        .game-info span {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 2px solid rgba(0, 255, 255, 0.3);
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
            background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 100%);
            border: 3px solid #00ffff;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
        }
        .controls {
            margin-top: 20px;
            font-size: 1rem;
            color: #aaa;
        }
        .btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #00ffff, #00ff00);
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(0, 255, 255, 0.6);
            border-radius: 50%;
            animation: rise 10s infinite;
        }
        @keyframes rise {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1); }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <h1>🛩️ 飞机大作战</h1>
        <div class="game-info">
            <span>得分：<strong id="score">0</strong></span>
            <span>生命：<strong id="lives">❤️❤️❤️</strong></span>
        </div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="controls">
            <p>🎮 操作：← → 方向键或 A/D 移动，空格键发射子弹</p>
            <p>💡 吃到蓝色道具加分，躲避红色障碍！</p>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>
    </div>
    <script>
        // 粒子效果
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 10 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
            const colors = ['#00ffff', '#ff00ff', '#00ff00'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particlesContainer.appendChild(particle);
        }

        // 游戏逻辑
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let player = { x: 275, y: 340, width: 50, height: 30 };
        let bullets = [];
        let obstacles = [];
        let bonuses = [];
        let keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && gameRunning) {
                bullets.push({ x: player.x + player.width/2, y: player.y, width: 4, height: 15 });
            }
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        function startGame() {
            gameRunning = true;
            score = 0;
            lives = 3;
            player.x = 275;
            bullets = [];
            obstacles = [];
            bonuses = [];
            updateScore();
            gameLoop();
            spawnObstacles();
            spawnBonuses();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = '❤️'.repeat(lives);
        }

        function spawnObstacles() {
            if (!gameRunning) return;
            obstacles.push({ x: Math.random() * 550, y: -30, width: 40, height: 40 });
            setTimeout(spawnObstacles, 1500 - Math.min(score, 1000));
        }

        function spawnBonuses() {
            if (!gameRunning) return;
            bonuses.push({ x: Math.random() * 550, y: -30, width: 25, height: 25 });
            setTimeout(spawnBonuses, 3000);
        }

        function update() {
            if (keys['ArrowLeft'] || keys['KeyA']) player.x = Math.max(0, player.x - 5);
            if (keys['ArrowRight'] || keys['KeyD']) player.x = Math.min(550, player.x + 5);

            bullets.forEach((b, i) => {
                b.y -= 8;
                if (b.y < 0) bullets.splice(i, 1);
            });

            obstacles.forEach((obs, i) => {
                obs.y += 3 + score/500;
                if (obs.y > 400) {
                    obstacles.splice(i, 1);
                    score += 10;
                    updateScore();
                }
                if (player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height && player.y + player.height > obs.y) {
                    obstacles.splice(i, 1);
                    lives--;
                    updateScore();
                    if (lives <= 0) {
                        gameRunning = false;
                        alert('游戏结束！得分：' + score);
                    }
                }
            });

            bonuses.forEach((bonus, i) => {
                bonus.y += 2;
                if (bonus.y > 400) bonuses.splice(i, 1);
                if (player.x < bonus.x + bonus.width && player.x + player.width > bonus.x &&
                    player.y < bonus.y + bonus.height && player.y + player.height > bonus.y) {
                    bonuses.splice(i, 1);
                    score += 50;
                    updateScore();
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, 600, 400);
            
            // 绘制玩家飞机
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(player.x + player.width/2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();

            // 绘制子弹
            ctx.fillStyle = '#ffff00';
            bullets.forEach(b => {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            });

            // 绘制障碍
            ctx.fillStyle = '#ff0044';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            });

            // 绘制奖励
            ctx.fillStyle = '#00ff00';
            bonuses.forEach(bonus => {
                ctx.beginPath();
                ctx.arc(bonus.x + 12, bonus.y + 12, 12, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 初始绘制
        draw();
    </script>
</body>
</html>
