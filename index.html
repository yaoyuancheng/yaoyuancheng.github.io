<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yao Yuancheng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e0e0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #4a9eff;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #4a9eff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .bio {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 1.5rem;
        }
        .tags {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .tag {
            background: rgba(74, 158, 255, 0.15);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(74, 158, 255, 0.3);
        }
        .links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }
        .link {
            color: #4a9eff;
            text-decoration: none;
            font-size: 1rem;
            transition: opacity 0.3s;
        }
        .link:hover {
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://avatars.githubusercontent.com/u/8936180?v=4" alt="Avatar" class="avatar">
        <h1>Yao Yuancheng</h1>
        <p class="bio">Building cool things with AI</p>
        <div class="tags">
            <span class="tag">🎵 Music Lover</span>
            <span class="tag">🤖 AI Enthusiast</span>
            <span class="tag">💻 Builder</span>
            <span class="tag">🦒 OpenClaw</span>
        </div>
        <div class="links">
            <a href="https://github.com/yaoyuancheng" class="link">GitHub</a>
        </div>
    </div>
</body>
</html>
